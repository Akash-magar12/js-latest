<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter App - Pro Way</title>
  </head>
  <body>
    <h1>Counter</h1>
    
    <!-- We wrap our counter inside a "building" (a div) -->
    <div id="counter-building">
      <button class="decre">-</button>
      <span id="screen">1</span>
      <button class="incre">+</button>
    </div>

    <script>
      // 1. Grab the ENTIRE building, and the screen
      const building = document.getElementById("counter-building");
      const screen = document.getElementById("screen");
      
      let count = 1;

      // 2. Put ONE event listener on the entire building
      // We pass the "event" object (e) to see exactly what triggered the click
      building.addEventListener("click", (e) => {
        
        // 3. Check if the thing they clicked has the class "incre"
        if (e.target.classList.contains("incre")) {
          count++;
        }
        
        // 4. Check if the thing they clicked has the class "decre"
        if (e.target.classList.contains("decre")) {
          // PRO TRICK: Math.max picks the highest number. 
          // If count - 1 drops below 0, it forces it to stay at 0! 
          // (This completely replaces your if/else statement)
          count = Math.max(1, count - 1);
        }

        // 5. Update the screen ONCE at the very end
        screen.textContent = count;
      });
    </script>
  </body>
</html>
