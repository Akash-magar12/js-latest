<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Directory</title>
    
    <style>
      /* ==========================================
         1. BASE STYLES & CENTERING
         ========================================== */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f4f8; /* Soft light blue/gray background */
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 50px 20px;
      }

      /* ==========================================
         2. MAIN CONTAINER
         ========================================== */
      .app-container {
        width: 100%;
        max-width: 800px; /* Keeps the app from stretching too wide on big screens */
        background-color: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }

      h1 {
        text-align: center;
        color: #1e293b;
        margin-bottom: 20px;
      }

      /* ==========================================
         3. SEARCH BAR
         ========================================== */
      .search-input {
        width: 100%;
        padding: 15px 20px;
        font-size: 16px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        margin-bottom: 40px;
        outline: none;
        transition: border-color 0.3s;
      }

      /* Turns the border blue when the user clicks to type */
      .search-input:focus {
        border-color: #3b82f6; 
      }

      /* ==========================================
         4. USER GRID (The magic layout tool)
         ========================================== */
      .user-grid {
        display: grid;
        /* This tells the grid to automatically fit as many 200px cards into a row as possible */
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 25px; /* Space between the cards */
      }

      /* ==========================================
         5. INDIVIDUAL USER CARDS
         ========================================== */
      .user-card {
        background-color: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 25px 20px;
        display: flex;
        flex-direction: column;
        align-items: center; /* Centers the image and text inside the card */
        text-align: center;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      /* Makes the card "float" up slightly when you hover over it */
      .user-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
      }

      /* ==========================================
         6. PROFILE IMAGES & TYPOGRAPHY
         ========================================== */
      .user-card img {
        width: 90px;
        height: 90px;
        border-radius: 50%; /* Makes the image a perfect circle */
        object-fit: cover; /* Prevents the image from squishing or stretching */
        margin-bottom: 15px;
        border: 3px solid #eff6ff;
      }

      .user-name {
        font-size: 1.2rem;
        font-weight: bold;
        color: #0f172a;
        margin-bottom: 5px;
      }

      .user-email {
        font-size: 0.9rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>

    <div class="app-container">
      
      <h1>User Directory</h1>
      
      <input type="text" class="search-input" placeholder="Search for a user..." />
      
      <!-- The Grid Container that holds all the cards -->
      <div class="user-grid" id="user-grid">
        
        <!-- User Card 1 (Your original user) -->
        <div class="user-card">
          <img
            src="https://plus.unsplash.com/premium_photo-1758726036082-af021cf4d9ba?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwyfHx8ZW58MHx8fHx8"
            alt="Manisha's Profile"
          />
          <p class="user-name">Manisha</p>
          <p class="user-email">manisha@gmail.com</p>
        </div>

        <!-- User Card 2 (Added to show off the grid layout!) -->
        <div class="user-card">
          <img
            src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=600&auto=format&fit=crop&q=60"
            alt="Alex's Profile"
          />
          <p class="user-name">Alex</p>
          <p class="user-email">alex@gmail.com</p>
        </div>

      </div>
    </div>

  </body>
</html>
