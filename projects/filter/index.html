<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Directory</title>

    <style>
      /* ==========================================
         1. BASE STYLES & CENTERING
         ========================================== */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f4f8; 
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 50px 20px;
      }

      .app-container {
        width: 100%;
        max-width: 800px; 
        background-color: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }

      h1 {
        text-align: center;
        color: #1e293b;
        margin-bottom: 20px;
      }

      .search-input {
        width: 100%;
        padding: 15px 20px;
        font-size: 16px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        margin-bottom: 40px;
        outline: none;
        transition: border-color 0.3s;
      }

      .search-input:focus {
        border-color: #3b82f6;
      }

      .user-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 25px; 
      }

      .user-card {
        background-color: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 25px 20px;
        display: flex;
        flex-direction: column;
        align-items: center; 
        text-align: center;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .user-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
      }

      .user-card img {
        width: 90px;
        height: 90px;
        border-radius: 50%; 
        object-fit: cover; 
        margin-bottom: 15px;
        border: 3px solid #eff6ff;
      }

      .user-name {
        font-size: 1.2rem;
        font-weight: bold;
        color: #0f172a;
        margin-bottom: 5px;
      }

      .user-email {
        font-size: 0.9rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <h1>User Directory</h1>

      <input
        type="text"
        class="search-input"
        placeholder="Search for a user..."
      />

      <div class="user-grid" id="user-grid"></div>
    </div>

    <script>
      let userGrid = document.querySelector("#user-grid");
      let search_input = document.querySelector(".search-input");
      
      const users = [
        {
          name: "Manisha Rajput",
          email: "pixel.wizard@studio.com",
          image: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=150&q=80",
        },
        {
          name: "Alex Chen",
          email: "server.admin@tech.io",
          image: "https://images.unsplash.com/photo-1599566150163-29194dcaad36?auto=format&fit=crop&w=150&q=80",
        },
        {
          name: "Sarah Jenkins",
          email: "marketing.guru@agency.net",
          image: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?auto=format&fit=crop&w=150&q=80",
        },
        {
          name: "David Miller",
          email: "coffee.lover88@hobby.com",
          image: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80",
        },
        {
          name: "Maya Patel",
          email: "hello.world@coders.org",
          image: "https://images.unsplash.com/photo-1580489944761-15a19d654956?auto=format&fit=crop&w=150&q=80",
        },
      ];

      // ==========================================
      // THE FIX: Adding a parameter!
      // ==========================================
      // By putting 'arrayToDraw' inside the parentheses, this function 
      // can now accept ANY array we hand it!
      function showAllCards(arrayToDraw) {
        let clutter = "";

        // Loop over the array we were handed, NOT the global 'users' array
        arrayToDraw.forEach((elem) => {
          clutter += ` 
          <div class="user-card">
            <img src="${elem.image}" alt="${elem.name}'s Profile" />
            <p class="user-name">${elem.name}</p>
            <p class="user-email">${elem.email}</p>
          </div>`;
        });
        
        // This is the ONLY place we need to update the DOM!
        userGrid.innerHTML = clutter;
      }

      function filterCards() {
        search_input.addEventListener("input", (e) => {
          const typedText = e.target.value.toLowerCase();

          // Filter the original array
          const filtered = users.filter((elem) => {
            return (
              elem.name.toLowerCase().includes(typedText) ||
              elem.email.toLowerCase().includes(typedText)
            );
          });

          // Give the new, smaller array to our drawing machine!
          showAllCards(filtered);
          
          // Notice I deleted the 'clutter' variables from here. We don't need them!
          // showAllCards() handles all the DOM updates for us.
        });
      }

      // Start the app by passing the FULL array into the machine
      showAllCards(users);
      
      // Start listening for typing
      filterCards();
    </script>
  </body>
</html>
