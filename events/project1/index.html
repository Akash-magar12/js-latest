<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keypad with Colored Button</title>
    <style>
      /* ==========================================
         1. BASE STYLES & CENTERING
         ========================================== */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f3f4f6; /* Soft gray background */
      }

      /* ==========================================
         2. MAIN CONTAINER
         ========================================== */
      .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 260px;
        text-align: center;
      }

      /* ==========================================
         3. THE NUMBER GRID
         ========================================== */
      .keypad {
        display: grid;
        grid-template-columns: repeat(3, 1fr); /* 3 equal columns */
        gap: 15px;
        margin-bottom: 25px;
      }

      /* Styling your spans to look like clickable keys */
      .keypad span {
        background-color: #f9fafb;
        border: 1px solid #e5e7eb;
        padding: 15px 0;
        border-radius: 8px;
        font-size: 20px;
        font-weight: bold;
        color: #374151;
        cursor: pointer;
        transition: background-color 0.2s;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .keypad span:hover {
        background-color: #e5e7eb;
      }

      /* Magic Trick: Pushes the '0' to the middle column at the bottom */
      .keypad span:last-child {
        grid-column: 2;
      }

      /* ==========================================
         4. THE COLORED BUTTON
         ========================================== */
      .colored-btn {
        background-color: #10b981; /* A vibrant emerald green */
        color: white;
        border: none;
        width: 100%;
        padding: 15px;
        border-radius: 8px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); /* Subtle green glow */

        /* Smooth transitions for hovering and clicking */
        transition:
          background-color 0.2s,
          transform 0.1s;
      }

      /* Darkens slightly when you hover over it */
      .colored-btn:hover {
        background-color: #059669;
      }

      /* 'active' means the exact moment the mouse clicks down */
      .colored-btn:active {
        transform: scale(0.95); /* Shrinks the button by 5% to feel "pressed" */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="keypad">
        <span class="box">1</span>
        <span class="box">2</span>
        <span class="box">3</span>
        <span class="box">4</span>
        <span class="box">5</span>
        <span class="box">6</span>
        <span class="box">7</span>
        <span class="box">8</span>
        <span class="box">9</span>
        <span class="box">0</span>
      </div>

      <button class="colored-btn">Enter</button>
    </div>

    <script>
      let container = document.querySelector(".container");
      container.addEventListener("click", (e) => {
        if (e.target.className === "box") {
          console.log(e.target.textContent);
        }
      });
    </script>
  </body>
</html>
